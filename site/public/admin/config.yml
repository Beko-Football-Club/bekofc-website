backend:
  name: github
  repo: Beko-Football-Club/bekofc-website
  branch: main
  base_url: https://api.netlify.com
  # NOTE: We use Netlify's free OAuth proxy for the GitHub auth dance. We are NOT hosted
  # on Netlify — the proxy just exchanges the OAuth code for a token. Plan 2 will swap this
  # to a self-hosted proxy on AWS Lambda if we want to remove the Netlify dependency.

media_folder: "site/public/uploads"
public_folder: "/uploads"

collections:
  - name: "smoke_test"
    label: "Smoke Test"
    files:
      - file: "content/smoke.yml"
        label: "Smoke Test Entry"
        name: "smoke"
        fields:
          - { label: "Message", name: "message", widget: "string" }
