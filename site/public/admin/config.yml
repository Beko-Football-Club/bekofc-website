backend:
  name: github
  repo: Beko-Football-Club/bekofc-website
  branch: main
  auth_type: pkce
  app_id: Ov23liJ2isfPAZdob98t
  # Sveltia uses GitHub's PKCE OAuth flow directly — no Netlify proxy required.
  # app_id is the BEKO FC CMS GitHub OAuth App Client ID (public, not a secret).
  # The OAuth App's Authorization callback URL must be: https://bekofc.com/admin/

media_folder: "site/public/uploads"
public_folder: "/uploads"

collections:
  - name: "smoke_test"
    label: "Smoke Test"
    files:
      - file: "content/smoke.yml"
        label: "Smoke Test Entry"
        name: "smoke"
        fields:
          - { label: "Message", name: "message", widget: "string" }
