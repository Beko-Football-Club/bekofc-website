backend:
  name: github
  repo: Beko-Football-Club/bekofc-website
  branch: main
  # Sveltia CMS uses GitHub's PKCE OAuth flow directly — no Netlify proxy required.
  # The OAuth callback URL on the GitHub OAuth App must be set to:
  #   https://bekofc.com/admin/
  # Sveltia is a Decap-compatible fork (same config schema, same Git-backed model).

media_folder: "site/public/uploads"
public_folder: "/uploads"

collections:
  - name: "smoke_test"
    label: "Smoke Test"
    files:
      - file: "content/smoke.yml"
        label: "Smoke Test Entry"
        name: "smoke"
        fields:
          - { label: "Message", name: "message", widget: "string" }
