backend:
  name: github
  repo: Beko-Football-Club/bekofc-website
  branch: main
  base_url: https://api.netlify.com
  # site_domain points the OAuth handshake at the Netlify-recognized site. We are NOT hosted
  # on Netlify — the proxy just exchanges the OAuth code for a token. The Netlify free site
  # exists solely so the proxy can authorize this `site_id`. Plan 2 may swap this to a
  # self-hosted Lambda proxy to remove the Netlify dependency entirely.
  site_domain: cddf1886-2d91-4fc7-b447-787d171c7203

media_folder: "site/public/uploads"
public_folder: "/uploads"

collections:
  - name: "smoke_test"
    label: "Smoke Test"
    files:
      - file: "content/smoke.yml"
        label: "Smoke Test Entry"
        name: "smoke"
        fields:
          - { label: "Message", name: "message", widget: "string" }
