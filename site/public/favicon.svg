<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 120">
  <!-- Shield background -->
  <path d="M 50 5 L 85 25 L 85 55 Q 85 85 50 110 Q 15 85 15 55 L 15 25 Z" fill="#0A0A0A" stroke="#FFD700" stroke-width="2.5"/>

  <!-- Split background (yellow and white) -->
  <path d="M 50 10 L 82 28 L 82 55 Q 82 82 50 105 Q 50 82 50 28 Z" fill="#FFD700"/>
  <path d="M 50 10 L 18 28 L 18 55 Q 18 82 50 105 Q 50 82 50 28 Z" fill="#FFFFFF"/>

  <!-- Soccer player silhouette (simplified) -->
  <g transform="translate(50, 40)">
    <!-- Head -->
    <circle cx="0" cy="-8" r="4" fill="#0A0A0A"/>
    <!-- Body -->
    <ellipse cx="0" cy="0" rx="3" ry="6" fill="#0A0A0A"/>
    <!-- Left leg (kicking) -->
    <path d="M -2 6 L -8 12" stroke="#0A0A0A" stroke-width="2" stroke-linecap="round"/>
    <!-- Right leg -->
    <path d="M 2 6 L 2 12" stroke="#0A0A0A" stroke-width="2" stroke-linecap="round"/>
    <!-- Left arm -->
    <path d="M -3 -1 L -7 2" stroke="#0A0A0A" stroke-width="2" stroke-linecap="round"/>
    <!-- Right arm -->
    <path d="M 3 -1 L 7 2" stroke="#0A0A0A" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Soccer ball -->
  <g transform="translate(62, 65)">
    <circle cx="0" cy="0" r="3.5" fill="none" stroke="#0A0A0A" stroke-width="0.8"/>
    <circle cx="0" cy="0" r="2.5" fill="#FFFFFF" stroke="#0A0A0A" stroke-width="0.6"/>
    <path d="M -1.5 0 L 1.5 0 M 0 -1.5 L 0 1.5" stroke="#0A0A0A" stroke-width="0.5"/>
  </g>

  <!-- B.F.D text (small) -->
  <text x="50" y="100" font-size="8" font-weight="bold" fill="#0A0A0A" text-anchor="middle" font-family="Arial, sans-serif">B.F.D</text>
</svg>